services:
  # 맥/일반 환경: docker-compose up notebook
  notebook:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - ./output:/app/output
    env_file:
      - .env
    environment:
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}

  # Brev GPU 서버: docker-compose up gpu
  gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "8888:8888"
      - "5000:5000"
    volumes:
      - .:/app
      - ./output:/app/output
      - huggingface_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - NVIDIA_BASE_URL=http://localhost:5000/v1
      - HF_HOME=/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  huggingface_cache:
